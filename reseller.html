<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PK LIBAS - Price Calculator for Resellers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.calculator-container{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border-radius:24px;box-shadow:0 25px 80px rgba(0,0,0,0.15),0 0 0 1px rgba(255,255,255,0.1);padding:40px 36px;max-width:480px;width:100%;position:relative;overflow:hidden}
.calculator-container::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#667eea,#764ba2,#f093fb,#f5576c);background-size:300% 100%;animation:gradientShift 4s ease infinite}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.title{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;text-align:center;color:#2d3748;letter-spacing:3px;margin-bottom:6px}
.subtitle{text-align:center;font-size:0.85rem;font-weight:500;color:#764ba2;letter-spacing:4px;text-transform:uppercase;margin-bottom:32px}
.quantity-tabs{display:flex;gap:8px;margin-bottom:28px;background:#f7fafc;padding:6px;border-radius:14px}
.tab-btn{flex:1;padding:12px 8px;border:none;background:transparent;border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;font-size:0.95rem;color:#718096;cursor:pointer;transition:all 0.3s ease;letter-spacing:0.5px}
.tab-btn:hover{color:#667eea}
.tab-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white;box-shadow:0 4px 15px rgba(102,126,234,0.4)}
.input-group{margin-bottom:24px}
.input-label{display:block;font-size:0.8rem;font-weight:600;color:#4a5568;margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase}
.input-field{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:14px;font-family:'Inter',sans-serif;font-size:1.1rem;font-weight:500;color:#2d3748;transition:all 0.3s ease;background:#fafafa}
.input-field:focus{outline:none;border-color:#667eea;background:white;box-shadow:0 0 0 4px rgba(102,126,234,0.1)}
.input-field::placeholder{color:#a0aec0}
.calculate-btn{width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-family:'Inter',sans-serif;font-size:1rem;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.3s ease;box-shadow:0 8px 25px rgba(102,126,234,0.3);margin-bottom:24px}
.calculate-btn:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(102,126,234,0.4)}
.calculate-btn:active{transform:translateY(0)}
.result-box{background:linear-gradient(135deg,#f7fafc,#edf2f7);border-radius:16px;padding:24px;text-align:center;border:1px solid #e2e8f0;display:none;animation:fadeIn 0.5s ease}
.result-box.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:0.75rem;font-weight:600;color:#718096;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.result-value{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#2d3748;line-height:1.2}
.result-value.ask-personally{color:#e53e3e;font-size:1.4rem}
.weight-notice{margin-top:28px;background:linear-gradient(135deg,#fff5f5,#fff);border:1px solid #fed7d7;border-radius:14px;padding:18px 20px;text-align:center;position:relative}
.weight-notice::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:3px;background:#fc8181;border-radius:0 0 4px 4px}
.weight-icon{font-size:1.4rem;margin-bottom:6px}
.weight-text{font-size:0.8rem;font-weight:500;color:#742a2a;line-height:1.6}
.weight-price{font-weight:700;color:#c53030}
.decorative-circle{position:absolute;border-radius:50%;opacity:0.03;pointer-events:none}
.circle-1{width:300px;height:300px;background:#667eea;top:-100px;right:-100px}
.circle-2{width:200px;height:200px;background:#764ba2;bottom:-60px;left:-60px}
@media(max-width:400px){.calculator-container{padding:30px 20px}.title{font-size:2rem}}
</style>
</head>
<body>
<div class="calculator-container">
<div class="decorative-circle circle-1"></div>
<div class="decorative-circle circle-2"></div>
<h1 class="title">PK LIBAS</h1>
<p class="subtitle">Price Calculator for Resellers</p>
<div class="quantity-tabs">
<button class="tab-btn active" data-pcs="1" onclick="selectTab(1)">1 PC</button>
<button class="tab-btn" data-pcs="2" onclick="selectTab(2)">2 PC</button>
<button class="tab-btn" data-pcs="3" onclick="selectTab(3)">3 PC</button>
</div>
<div class="input-group">
<label class="input-label">PKR Amount</label>
<input type="number" class="input-field" id="pkrAmount" placeholder="Enter amount in PKR" min="0">
</div>
<button class="calculate-btn" onclick="calculatePrice()">Calculate Price</button>
<div class="result-box" id="resultBox">
<div class="result-label">Final Price</div>
<div class="result-value" id="resultValue"></div>
</div>
<div class="weight-notice">
<div class="weight-icon">&#128230;</div>
<div class="weight-text">
Weight charges will be calculated separately upon delivery in Pakistan at <span class="weight-price">1650 TK/kg</span>.<br>
Picture will be provided for transparency.
</div>
</div>
</div>
<script>
let selectedPcs=1;
const p={1:[300,350,400,400,500],2:[300,400,450,450,550],3:[300,400,500,500,600]};
const b=[2000,5000,8000,10000,12000];
function selectTab(n){selectedPcs=n;document.querySelectorAll('.tab-btn').forEach(btn=>{btn.classList.remove('active');if(parseInt(btn.dataset.pcs)===n)btn.classList.add('active')});document.getElementById('resultBox').classList.remove('show')}
function round50(n){return Math.ceil(n/50)*50}
function getP(x){const a=p[selectedPcs];if(x>b[4])return null;for(let i=0;i<b.length;i++){if(x<=b[i])return a[i]}return a[a.length-1]}
function calculatePrice(){const v=parseFloat(document.getElementById('pkrAmount').value);if(isNaN(v)||v<0){alert('Please enter a valid PKR amount');return}const x=(v+500)/2.21;const pr=getP(x);const rb=document.getElementById('resultBox');const rv=document.getElementById('resultValue');rb.classList.add('show');if(pr===null){rv.innerHTML='Ask Personally';rv.classList.add('ask-personally')}else{const fp=round50(x+pr);rv.innerHTML='&#2547;'+fp.toLocaleString();rv.classList.remove('ask-personally')}}
document.getElementById('pkrAmount').addEventListener('keypress',function(e){if(e.key==='Enter')calculatePrice()});
</script>
</body>
</html>
