<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PK LIBAS - Order Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #4a4e8c 0%, #2d2d5a 50%, #1a1a3e 100%);
      min-height: 100vh;
      padding: 20px 15px;
    }

    .main-card {
      background: #f0f2ff;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto 20px;
      padding: 30px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      color: #2d2d5a;
      letter-spacing: 2px;
    }
    .subtitle {
      text-align: center;
      color: #6b5b95;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
      margin-bottom: 30px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: #2d2d5a;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s;
      background: white;
    }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .input-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 12px;
    }
    .row .input-group {
      flex: 1;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(102,126,234,0.35);
      transition: transform 0.2s;
      font-family: 'Poppins', sans-serif;
      margin-top: 10px;
    }
    .submit-btn:active { transform: scale(0.97); }
    .submit-btn:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }

    .whatsapp-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(37,211,102,0.35);
      transition: transform 0.2s;
      font-family: 'Poppins', sans-serif;
      margin-top: 10px;
      display: none;
      text-decoration: none;
      text-align: center;
    }
    .whatsapp-btn.show { display: block; }
    .whatsapp-btn:active { transform: scale(0.97); }

    .success-msg {
      background: #e8f5e9;
      border: 1px solid #4caf50;
      color: #2e7d32;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }
    .success-msg.show { display: block; }

    .orders-list {
      margin-top: 20px;
    }
    .order-item {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid #667eea;
    }
    .order-item .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .order-item .order-id {
      font-weight: 600;
      color: #2d2d5a;
      font-size: 14px;
    }
    .order-item .order-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-paid { background: #e8f5e9; color: #2e7d32; }
    .status-delivered { background: #e3f2fd; color: #1565c0; }
    .order-item .order-details {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    .order-item .order-price {
      font-weight: 600;
      color: #667eea;
      margin-top: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .back-link {
      display: block;
      text-align: center;
      color: #667eea;
      font-size: 13px;
      text-decoration: none;
      margin-top: 20px;
      font-weight: 500;
    }

    .info-badge {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* File upload styling */
    .file-upload {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .file-upload input[type="file"] {
      display: none;
    }
    .file-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
      white-space: nowrap;
    }
    .file-upload-label:active { transform: scale(0.97); }
    .file-name {
      font-size: 12px;
      color: #666;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .image-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .image-preview img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #e0e0e0;
    }
  </style>
<base target="_blank">
</head>
<body>
  <div class="main-card">
    <div class="logo">PK LIBAS</div>
    <div class="subtitle">Order Manager</div>

    <div class="info-badge">
      📱 Orders will be sent to WhatsApp: +92 330 6225595
    </div>

    <div class="section-title">Add New Order</div>

    <div class="input-group">
      <label>Reseller Name</label>
      <input type="text" id="resellerName" placeholder="Enter reseller name">
    </div>

    <div class="input-group">
      <label>Customer Name (Optional)</label>
      <input type="text" id="customerName" placeholder="Enter customer name">
    </div>

    <div class="input-group">
      <label>Dress Details</label>
      <textarea id="dressDetails" placeholder="Describe the dress (color, style, brand, etc.)"></textarea>
    </div>

    <div class="row">
      <div class="input-group">
        <label>Size</label>
        <select id="size">
          <option value="">Select</option>
          <option value="XS">XS</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
          <option value="XXL">XXL</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div class="input-group">
        <label>Stitch</label>
        <select id="stitch">
          <option value="">Select</option>
          <option value="Unstitched">Unstitched</option>
          <option value="Stitched">Stitched</option>
          <option value="Semi-Stitched">Semi-Stitched</option>
        </select>
      </div>
    </div>

    <div class="input-group">
      <label>Dress URL (Copy & paste link)</label>
      <input type="text" id="dressUrl" placeholder="https://...">
    </div>

    <div class="input-group">
      <label>Attach Pictures</label>
      <div class="file-upload">
        <label for="dressImages" class="file-upload-label">📎 Choose Files</label>
        <input type="file" id="dressImages" accept="image/*" multiple onchange="handleFileSelect(this)">
        <span class="file-name" id="fileName">No files selected</span>
      </div>
      <div class="image-preview" id="imagePreview"></div>
    </div>

    <div class="row">
      <div class="input-group">
        <label>Price (TK)</label>
        <input type="number" id="price" placeholder="0" oninput="calculateRemaining()">
      </div>
      <div class="input-group">
        <label>Advance Payment (TK)</label>
        <input type="number" id="advance" placeholder="0" oninput="calculateRemaining()">
      </div>
    </div>

    <div class="input-group">
      <label>Remaining Amount (TK)</label>
      <input type="number" id="remaining" placeholder="0" readonly>
    </div>

    <div class="input-group">
      <label>Notes (Optional)</label>
      <textarea id="notes" placeholder="Any special instructions..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="prepareOrder()">📋 Prepare Order</button>

    <a class="whatsapp-btn" id="whatsappBtn" href="#" target="_blank">📱 Send Order via WhatsApp</a>

    <div class="success-msg" id="successMsg">
      ✅ Order prepared! Tap the green button above to send it via WhatsApp.
    </div>

    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <div class="main-card">
    <div class="section-title">📦 Saved Orders</div>
    <div id="ordersList">
      <div class="empty-state">
        <div class="icon">📭</div>
        <div>No orders saved yet</div>
      </div>
    </div>
  </div>

  <script>
    let attachedImages = [];

    // Load saved orders
    loadOrders();

    function calculateRemaining() {
      const price = parseFloat(document.getElementById('price').value) || 0;
      const advance = parseFloat(document.getElementById('advance').value) || 0;
      const remaining = Math.max(0, price - advance);
      document.getElementById('remaining').value = remaining;
    }

    function handleFileSelect(input) {
      const files = input.files;
      const fileNameSpan = document.getElementById('fileName');
      const preview = document.getElementById('imagePreview');

      if (files.length === 0) {
        fileNameSpan.textContent = 'No files selected';
        preview.innerHTML = '';
        attachedImages = [];
        return;
      }

      fileNameSpan.textContent = files.length + ' file(s) selected';
      preview.innerHTML = '';
      attachedImages = [];

      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          preview.appendChild(img);
          attachedImages.push(e.target.result);
        };
        reader.readAsDataURL(file);
      });
    }

    function prepareOrder() {
      const reseller = document.getElementById('resellerName').value.trim();
      const customer = document.getElementById('customerName').value.trim();
      const details = document.getElementById('dressDetails').value.trim();
      const size = document.getElementById('size').value;
      const stitch = document.getElementById('stitch').value;
      const url = document.getElementById('dressUrl').value.trim();
      const price = document.getElementById('price').value;
      const advance = document.getElementById('advance').value;
      const remaining = document.getElementById('remaining').value;
      const notes = document.getElementById('notes').value.trim();
      const orderNum = 'PKL-' + Date.now().toString().slice(-6);

      if (!reseller || !details || !price) {
        alert('Please fill in Reseller Name, Dress Details, and Price.');
        return;
      }

      // Build WhatsApp message
      const message = `🛒 *NEW ORDER - PK LIBAS*

📋 Order #: ${orderNum}
👤 Reseller: ${reseller}
${customer ? '🧑 Customer: ' + customer + '\n' : ''}👗 Dress: ${details}
📏 Size: ${size || 'N/A'}
🪡 Stitch: ${stitch || 'N/A'}
💰 Price: ${price} TK
💳 Advance: ${advance || '0'} TK
💵 Remaining: ${remaining || '0'} TK
${url ? '🔗 URL: ' + url + '\n' : ''}${attachedImages.length > 0 ? '📎 Images: ' + attachedImages.length + ' attached\n' : ''}${notes ? '📝 Notes: ' + notes + '\n' : ''}
⏰ Submitted: ${new Date().toLocaleString()}`;

      // Create WhatsApp link
      const whatsappUrl = 'https://wa.me/923306225595?text=' + encodeURIComponent(message);

      // Save order locally
      const order = {
        id: orderNum,
        reseller, customer, details, size, stitch, url, price, advance, remaining, notes,
        images: attachedImages,
        date: new Date().toISOString()
      };

      let orders = JSON.parse(localStorage.getItem('pkl_orders') || '[]');
      orders.unshift(order);
      localStorage.setItem('pkl_orders', JSON.stringify(orders));

      // Show WhatsApp button
      const btn = document.getElementById('whatsappBtn');
      btn.href = whatsappUrl;
      btn.classList.add('show');

      document.getElementById('successMsg').classList.add('show');

      // Refresh orders list
      loadOrders();

      // Reset form
      document.getElementById('resellerName').value = '';
      document.getElementById('customerName').value = '';
      document.getElementById('dressDetails').value = '';
      document.getElementById('size').value = '';
      document.getElementById('stitch').value = '';
      document.getElementById('dressUrl').value = '';
      document.getElementById('dressImages').value = '';
      document.getElementById('fileName').textContent = 'No files selected';
      document.getElementById('imagePreview').innerHTML = '';
      document.getElementById('price').value = '';
      document.getElementById('advance').value = '';
      document.getElementById('remaining').value = '';
      document.getElementById('notes').value = '';
      attachedImages = [];
    }

    function loadOrders() {
      const orders = JSON.parse(localStorage.getItem('pkl_orders') || '[]');
      const container = document.getElementById('ordersList');

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <div>No orders saved yet</div>
          </div>`;
        return;
      }

      container.innerHTML = orders.map(o => `
        <div class="order-item">
          <div class="order-header">
            <span class="order-id">${o.id}</span>
          </div>
          <div class="order-details">
            <strong>${o.reseller}</strong>${o.customer ? ' → ' + o.customer : ''}<br>
            ${o.details}<br>
            ${o.size ? 'Size: ' + o.size + ' | ' : ''}${o.stitch ? 'Stitch: ' + o.stitch : ''}
          </div>
          <div class="order-price">${o.price} TK ${o.advance ? '(Adv: ' + o.advance + ' TK, Rem: ' + (o.remaining || '0') + ' TK)' : ''}</div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
